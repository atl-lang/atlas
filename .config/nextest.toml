# Atlas nextest configuration
# https://nexte.st/book/configuration

[profile.default]
test-threads = "num-cpus"
failure-output = "immediate"
# Kill runaway tests fast — AI-generated VM/interpreter code can introduce
# infinite loops that consume all CPU/memory. 30s is generous for any unit test.
slow-timeout = { period = "15s", terminate-after = 2 }

# fs_watch test legitimately needs time for filesystem events
[[profile.default.overrides]]
filter = "test(fs_watch)"
slow-timeout = { period = "30s", terminate-after = 2 }
