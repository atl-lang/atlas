[build]
jobs = 8
# sccache: globally caches compiled dep artifacts — survives cache cleans and killed cargo processes
# After first compile, reqwest/tokio/rustls/etc. serve from cache in seconds instead of minutes
rustc-wrapper = "sccache"

[profile.dev]
# macOS: unpacked split-debuginfo is 2-3x faster linking than default "packed"
split-debuginfo = "unpacked"
incremental = true
opt-level = 0
# level 1 debug info — faster codegen, still useful for debugging
debug = 1

[profile.test]
split-debuginfo = "unpacked"
incremental = true
debug = 1
