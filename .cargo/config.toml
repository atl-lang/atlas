[build]
jobs = 8
# sccache is configured locally via RUSTC_WRAPPER env var (e.g. in ~/.zshrc or shell profile)
# Do NOT set rustc-wrapper here — CI runners don't have sccache installed

[profile.dev]
incremental = true
opt-level = 0
# level 1 debug info — faster codegen, still useful for debugging
debug = 1

[profile.test]
incremental = true
debug = 1
